<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建菜品 - 99Food Manager</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo-container">
            <div class="logo"></div>
            <span class="title">99Food Manager</span>
        </div>
        <div class="header-right">
            <span class="user-name">David Copperfield</span>
        </div>
    </header>

    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-item">
                <span>Overview</span>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-header">Menu</div>
                <div class="sidebar-item active">
                    <span>Menu</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="form-container">
                <div class="form-header">
                    <h1 id="formTitle">新建菜品</h1>
                    <button class="btn-secondary" id="backBtn">返回列表</button>
                </div>

                <form id="dishForm" class="dish-form">
                    <!-- 基本信息 -->
                    <div class="form-section">
                        <h2 class="section-title">基本信息</h2>
                        
                        <div class="form-group">
                            <label for="dishName">菜品名称 *</label>
                            <input type="text" id="dishName" name="name" required placeholder="请输入菜品名称">
                            <span class="error-message" id="nameError"></span>
                        </div>

                        <div class="form-group">
                            <label for="dishDescription">菜品描述</label>
                            <textarea id="dishDescription" name="description" rows="4" placeholder="请输入菜品描述"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="dishCategory">分类 *</label>
                            <select id="dishCategory" name="categoryId" required>
                                <option value="">请选择分类</option>
                            </select>
                            <span class="error-message" id="categoryError"></span>
                        </div>
                    </div>

                    <!-- 价格信息 -->
                    <div class="form-section">
                        <h2 class="section-title">价格信息</h2>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="deliveryPrice">配送价格 *</label>
                                <input type="number" id="deliveryPrice" name="deliveryPrice" step="0.01" min="0" required placeholder="0.00">
                                <span class="error-message" id="deliveryPriceError"></span>
                            </div>

                            <div class="form-group">
                                <label for="pickupPrice">自取价格 *</label>
                                <input type="number" id="pickupPrice" name="pickupPrice" step="0.01" min="0" required placeholder="0.00">
                                <span class="error-message" id="pickupPriceError"></span>
                            </div>
                        </div>
                    </div>

                    <!-- 库存信息 -->
                    <div class="form-section">
                        <h2 class="section-title">库存信息</h2>
                        
                        <div class="form-group">
                            <label for="stockType">库存类型</label>
                            <select id="stockType" name="stockType">
                                <option value="unlimited">无限制</option>
                                <option value="limited">有限数量</option>
                            </select>
                        </div>

                        <div class="form-group" id="stockAmountGroup" style="display: none;">
                            <label for="stockAmount">库存数量</label>
                            <input type="number" id="stockAmount" name="stockAmount" min="0" placeholder="请输入库存数量">
                        </div>
                    </div>

                    <!-- 图片上传 -->
                    <div class="form-section">
                        <h2 class="section-title">菜品图片</h2>
                        
                        <div class="form-group">
                            <label for="dishImage">上传图片</label>
                            <div class="image-upload">
                                <input type="file" id="dishImage" name="image" accept="image/*">
                                <div class="image-preview" id="imagePreview">
                                    <span>点击选择图片或拖拽到此处</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 状态 -->
                    <div class="form-section">
                        <h2 class="section-title">状态设置</h2>
                        
                        <div class="form-group">
                            <label class="toggle-label">
                                <input type="checkbox" id="dishStatus" name="status" checked>
                                <span class="toggle-switch"></span>
                                <span class="toggle-text">启用菜品</span>
                            </label>
                        </div>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="cancelBtn">取消</button>
                        <button type="submit" class="btn-primary" id="submitBtn">保存</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/category.js"></script>
    <script src="js/dish.js"></script>
    <script src="js/form.js"></script>
</body>
</html>
